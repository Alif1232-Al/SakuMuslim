<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="50%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <linearGradient id="domeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e3f2fd"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)"/>

  <!-- Left minaret base -->
  <rect x="28" y="90" width="14" height="60" rx="2" fill="white"/>
  <!-- Left minaret body -->
  <rect x="30" y="70" width="10" height="25" rx="1" fill="white"/>
  <!-- Left minaret cap -->
  <polygon points="30,70 35,55 40,70" fill="white"/>
  <!-- Left minaret top crescent -->
  <circle cx="35" cy="53" r="3" fill="white"/>
  <circle cx="36.2" cy="52" r="2.6" fill="url(#bgGrad)"/>
  <!-- Left minaret body stripes -->
  <rect x="30" y="82" width="10" height="2" fill="#0D47A1" opacity="0.25"/>
  <rect x="30" y="92" width="10" height="2" fill="#0D47A1" opacity="0.25"/>

  <!-- Right minaret base -->
  <rect x="158" y="90" width="14" height="60" rx="2" fill="white"/>
  <!-- Right minaret body -->
  <rect x="160" y="70" width="10" height="25" rx="1" fill="white"/>
  <!-- Right minaret cap -->
  <polygon points="160,70 165,55 170,70" fill="white"/>
  <!-- Right minaret top crescent -->
  <circle cx="165" cy="53" r="3" fill="white"/>
  <circle cx="166.2" cy="52" r="2.6" fill="url(#bgGrad)"/>
  <!-- Right minaret body stripes -->
  <rect x="160" y="82" width="10" height="2" fill="#0D47A1" opacity="0.25"/>
  <rect x="160" y="92" width="10" height="2" fill="#0D47A1" opacity="0.25"/>

  <!-- Main building body -->
  <rect x="50" y="105" width="100" height="45" rx="3" fill="white"/>
  <!-- Building base accent -->
  <rect x="50" y="145" width="100" height="5" rx="2" fill="white" opacity="0.7"/>

  <!-- Main door / entrance -->
  <rect x="88" y="120" width="24" height="30" rx="12 12 0 0" fill="url(#bgGrad)"/>

  <!-- Dome -->
  <ellipse cx="100" cy="105" rx="42" ry="38" fill="white"/>
  <!-- Dome top highlight -->
  <ellipse cx="100" cy="95" rx="30" ry="22" fill="#e3f2fd" opacity="0.4"/>

  <!-- Dome base line -->
  <rect x="58" y="105" width="84" height="4" rx="2" fill="#0D47A1" opacity="0.15"/>

  <!-- Crescent moon on dome -->
  <circle cx="100" cy="58" r="11" fill="white"/>
  <circle cx="103.5" cy="56.5" r="9.5" fill="url(#bgGrad)"/>

  <!-- Star next to crescent -->
  <polygon points="115,58 116.5,61 120,61.5 117.3,63.8 118,67 115,65.2 112,67 112.7,63.8 110,61.5 113.5,61" fill="white"/>

  <!-- Small window circles -->
  <circle cx="72" cy="122" r="5" fill="url(#bgGrad)" opacity="0.6"/>
  <circle cx="100" cy="118" r="5" fill="url(#bgGrad)" opacity="0.6"/>
  <circle cx="128" cy="122" r="5" fill="url(#bgGrad)" opacity="0.6"/>
</svg>
